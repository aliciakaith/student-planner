<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UniTrack</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      color: #111827;
      background: #fff;
    }

    .header {
      background: #4F46E5;
      color: white;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header-logo { font-size: 18px; }
    .header-title { font-weight: 600; font-size: 15px; }
    .header-sub { font-size: 11px; opacity: 0.8; margin-top: 1px; }

    .body { padding: 16px; }

    /* Status pill */
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 99px;
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 14px;
    }
    .status-pill.connected { background: #D1FAE5; color: #065F46; }
    .status-pill.disconnected { background: #FEE2E2; color: #991B1B; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; }
    .status-pill.connected .status-dot { background: #059669; }
    .status-pill.disconnected .status-dot { background: #DC2626; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: #6B7280;
      margin-bottom: 4px;
      margin-top: 10px;
    }
    label:first-of-type { margin-top: 0; }

    input {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #D1D5DB;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #4F46E5; box-shadow: 0 0 0 3px rgba(79,70,229,0.12); }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      margin-top: 12px;
    }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-primary { background: #4F46E5; color: white; }
    .btn-primary:hover:not(:disabled) { background: #4338CA; }
    .btn-danger { background: #FEF2F2; color: #DC2626; border: 1px solid #FECACA; }
    .btn-danger:hover:not(:disabled) { background: #FEE2E2; }
    .btn-outline { background: white; color: #374151; border: 1px solid #D1D5DB; }
    .btn-outline:hover:not(:disabled) { background: #F9FAFB; }

    .divider {
      border: none;
      border-top: 1px solid #F3F4F6;
      margin: 14px 0;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: #9CA3AF;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .msg {
      font-size: 12px;
      padding: 8px 10px;
      border-radius: 6px;
      margin-top: 10px;
    }
    .msg.success { background: #D1FAE5; color: #065F46; }
    .msg.error { background: #FEE2E2; color: #991B1B; }
    .msg.info { background: #EFF6FF; color: #1D4ED8; }

    .token-row {
      display: flex;
      gap: 6px;
      align-items: flex-end;
    }
    .token-row input { flex: 1; }
    .token-copy {
      padding: 7px 10px;
      border: 1px solid #D1D5DB;
      border-radius: 6px;
      background: white;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      color: #374151;
      transition: background 0.15s;
    }
    .token-copy:hover { background: #F3F4F6; }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    #view-login, #view-connected { display: none; }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-logo">🎓</span>
    <div>
      <div class="header-title">UniTrack</div>
      <div class="header-sub">Graduate Job Tracker</div>
    </div>
  </div>

  <div class="body">

    <!-- LOGIN VIEW -->
    <div id="view-login">
      <p style="font-size:13px;color:#6B7280;margin-bottom:12px;">
        Connect to your UniTrack account to save jobs with one click.
      </p>

      <div class="section-title">API URL</div>
      <input id="api-url-input" type="url" placeholder="https://your-app.vercel.app" />

      <label for="token-input">Extension Token</label>
      <input id="token-input" type="password" placeholder="Paste token from Settings → Extension" />

      <button class="btn btn-primary" id="connect-btn">Connect</button>
      <div id="login-msg"></div>

      <hr class="divider" />
      <p style="font-size:11px;color:#9CA3AF;">
        Find your extension token in UniTrack → Settings → Browser Extension.
      </p>
    </div>

    <!-- CONNECTED VIEW -->
    <div id="view-connected">
      <span class="status-pill connected" id="status-pill">
        <span class="status-dot"></span>
        Connected
      </span>

      <div class="section-title">Account</div>
      <p id="connected-url" style="font-size:12px;color:#6B7280;margin-bottom:4px;word-break:break-all;"></p>

      <button class="btn btn-outline" id="save-current-btn">📌 Save current page</button>
      <div id="save-msg"></div>

      <hr class="divider" />

      <div class="section-title">Settings</div>
      <label>API URL</label>
      <input id="settings-api-url" type="url" />
      <label>Extension Token</label>
      <input id="settings-token" type="password" />
      <button class="btn btn-outline" id="update-btn">Update</button>

      <hr class="divider" />
      <button class="btn btn-danger" id="disconnect-btn">Disconnect</button>
    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
